    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-wrapper">
            <span class="close-lightbox">&times;</span>
            <img class="lightbox-content" id="lightbox-img">
        </div>
        <span class="nav-btn prev" id="prev-btn">&#10094;</span>
        <span class="nav-btn next" id="next-btn">&#10095;</span>
    </div>

    <!-- Masonry.js einbinden -->
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script>
        // Masonry initialisieren
        window.addEventListener('load', function() {
            var grid = document.querySelector('#masonry-container');
            var msnry = new Masonry(grid, {
                itemSelector: '.gallery-item',
                columnWidth: '.gallery-item',
                percentPosition: true,
                gutter: 10
            });
        });

        // Lightbox Logik
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-lightbox');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        const allImages = Array.from(document.querySelectorAll('.gallery-item img'));
        let currentIndex = 0;

        function updateLightboxImage() {
            lightboxImg.src = allImages[currentIndex].src;
        }

        allImages.forEach((img, index) => {
            img.onclick = function() {
                currentIndex = index;
                updateLightboxImage();
                lightbox.style.display = 'flex';
            };
        });

        closeBtn.onclick = function() {
            lightbox.style.display = 'none';
        };

        prevBtn.onclick = function(e) {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
            updateLightboxImage();
        };

        nextBtn.onclick = function(e) {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % allImages.length;
            updateLightboxImage();
        };

        lightbox.onclick = function(e) {
            if (e.target === lightbox || e.target.classList.contains('lightbox-wrapper')) {
                lightbox.style.display = 'none';
            }
        };
    </script>
