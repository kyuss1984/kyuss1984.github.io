            // Aktuelle Kategorie

             // Funktion zum Generieren der Galerie-Elemente
             function generateGalleryItems(category) {
                 const container = document.getElementById('masonry-container');
                 container.innerHTML = ''; // Leere den Container

                 let items = [];
                 
                 // Zeige nur Elemente der ausgewählten Kategorie an
                 if (folderMapping[category]) {
                     items = folderMapping[category].images.map(src => ({ src, type: 'image' }));
                     items = items.concat(folderMapping[category].videos.map(src => ({ src, type: 'video' })));
                 }

                 // Erstelle die Galerie-Elemente
                 items.forEach(item => {
                     const div = document.createElement('div');
                     div.className = 'gallery-item';
                     if (item.type === 'video') {
                         div.classList.add('video-item');
                         div.innerHTML = `<video data-src="${item.src}" class="lazy-video" muted loop playsinline autoplay></video>`;
                     } else {
                         div.innerHTML = `<img data-src="${item.src}" alt="Galeriebild" class="lazy">`;
                     }
                     container.appendChild(div);
                 });

                 // Reinitialisiere Masonry
                 msnry.reloadItems();
                 msnry.layout();

                 // Reinitialisiere Lazy Loading
                 initLazyLoading();
                 
                 // Manuell ein Scroll-Event auslösen, um sicherzustellen, dass sichtbare Elemente geladen werden
                 window.dispatchEvent(new Event('scroll'));
             }

            // Funktion zum Initialisieren des Lazy Loading
            function initLazyLoading() {
                const lazyElements = Array.from(document.querySelectorAll('img.lazy, video.lazy-video'));
                let loadingCount = 0;
                const maxConcurrentLoads = 35; // Limit to 35 concurrent loads
                
                // Function to load an element (image or video)
                function loadElement(element) {
                    if (loadingCount >= maxConcurrentLoads) return false;
                    
                    loadingCount++;
                    element.src = element.dataset.src; // Set the src from data-src
                    element.classList.remove('lazy', 'lazy-video');
                    
                    // For images
                    if (element.tagName === 'IMG') {
                        element.onload = () => {
                            loadingCount--;
                            element.classList.add('loaded');
                            msnry.layout();
                            loadNextElement();
                        };
                        
                        element.onerror = () => {
                            loadingCount--;
                            element.classList.add('error');
                            loadNextElement();
                        };
                    } 
                    // For videos
                    else if (element.tagName === 'VIDEO') {
                        element.onloadeddata = () => {
                            loadingCount--;
                            element.classList.add('loaded');
                            msnry.layout();
                            
                            // Try to play the video automatically
                            if (element.autoplay) {
                                element.muted = true; // Ensure muted for autoplay
                                element.play().catch(e => console.log("Autoplay failed:", e));
                            }
                            
                            loadNextElement();
                        };
                        
                        element.onerror = () => {
                            loadingCount--;
                            element.classList.add('error');
                            loadNextElement();
                        };
                        
                        // Start loading the video data
                        element.load();
                    }
                    
                    return true;
                }
                
                // Function to load the next available element
                function loadNextElement() {
                    if (loadingCount >= maxConcurrentLoads) return;
                    
                    for (let i = 0; i < lazyElements.length; i++) {
                        const element = lazyElements[i];
                        if (element.classList.contains('lazy') || element.classList.contains('lazy-video')) {
                            if (isInViewport(element)) {
                                if (loadElement(element)) {
                                    break; // Only load one element at a time
                                }
                            }
                        }
                    }
                }
                
                // Helper function to check if an element is in the viewport or near the bottom
                function isInViewport(element) {
                    const rect = element.getBoundingClientRect();
                    // Load elements that are in viewport or below the viewport
                    // Use an even larger preload area on mobile devices for fast scrolling
                    const isMobile = window.innerWidth <= MOBILE_BREAKPOINT;
                    const preloadDistance = isMobile ? 3500 : 1500; // 3500px preload on mobile, 1500px on desktop
                    return (
                        rect.top >= 0 &&
                        rect.left >= 0 &&
                        rect.top <= (window.innerHeight || document.documentElement.clientHeight) + preloadDistance
                    );
                }
                
                // Initial load of visible elements
                loadNextElement();
                
                // Also check when scrolling
                let scrollTimer;
                window.addEventListener('scroll', function() {
                    // Debounce scroll events with even shorter delay for better responsiveness with fast scrolling
                    clearTimeout(scrollTimer);
                    scrollTimer = setTimeout(loadNextElement, 25);
                });
            }

            // Konfiguration für Breakpoints
            const MOBILE_BREAKPOINT = 768;
            
            // Event Listener für Ordner-Navigation
            const folderLinks = document.querySelectorAll('.folder-link');
            folderLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const category = this.getAttribute('data-folder');
                    
                    // Entferne aktive Klasse von allen Links
                    folderLinks.forEach(l => l.classList.remove('active'));
                    
                    // Füge aktive Klasse zum geklickten Link hinzu
                    this.classList.add('active');
                    
                    // Generiere Galerie für die ausgewählte Kategorie
                    generateGalleryItems(category);
                });
            });

            // Zeige alle Elemente beim ersten Laden der Seite an
            generateGalleryItems("Animals of War");

            // Lightbox Logik mit Event Delegation
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            let currentIndex = 0;
            
            // Helper function to get all gallery elements (images and videos)
            function getAllGalleryElements() {
                return Array.from(document.querySelectorAll('.gallery-item img, .gallery-item video'));
            }

            // Update lightbox content
            function updateLightboxContent() {
                const elements = getAllGalleryElements();
                if (elements.length > 0 && currentIndex >= 0 && currentIndex < elements.length) {
                    const element = elements[currentIndex];
                    
                    // Clear previous content
                    lightboxImg.style.display = 'none';
                    const video = lightbox.querySelector('video');
                    if (video) video.remove();
                    
                    // If it's an image
                    if (element.tagName === 'IMG') {
                        // Load the image if it hasn't been loaded yet
                        if (!element.src && element.dataset.src) {
                            element.src = element.dataset.src;
                        }
                        lightboxImg.src = element.src || element.dataset.src;
                        lightboxImg.alt = element.alt;
                        lightboxImg.style.display = 'block';
                    } 
                    // If it's a video
                    else if (element.tagName === 'VIDEO') {
                        // Load the video if it hasn't been loaded yet
                        if (!element.src && element.dataset.src) {
                            element.src = element.dataset.src;
                            element.load();
                        }
                        const videoElement = document.createElement('video');
                        videoElement.src = element.src || element.dataset.src;
                        videoElement.controls = true;
                        videoElement.autoplay = true;
                        videoElement.loop = true;
                        videoElement.muted = false;
                        videoElement.style.maxWidth = '90vw';
                        videoElement.style.maxHeight = '90vh';
                        videoElement.style.borderRadius = '4px';
                        videoElement.style.boxShadow = '0 0 20px rgba(0,0,0,0.5)';
                        lightbox.querySelector('.lightbox-wrapper').insertBefore(videoElement, lightboxImg);
                    }
                }
            }

            // Open lightbox
            function openLightbox(index) {
                currentIndex = index;
                updateLightboxContent();
                lightbox.style.display = 'flex';
                lightbox.setAttribute('aria-hidden', 'false');
                // Prevent background scrolling
                document.body.style.overflow = 'hidden';
            }

            // Close lightbox
            function closeLightbox() {
                lightbox.style.display = 'none';
                lightbox.setAttribute('aria-hidden', 'true');
                // Re-enable background scrolling
                document.body.style.overflow = '';
                
                // Pause any playing video in lightbox
                const video = lightbox.querySelector('video');
                if (video) {
                    video.pause();
                    video.remove();
                }
            }

            // Navigate to next element
            function nextElement() {
                const elements = getAllGalleryElements();
                if (elements.length > 0) {
                    currentIndex = (currentIndex + 1) % elements.length;
                    updateLightboxContent();
                }
            }

            // Navigate to previous element
            function prevElement() {
                const elements = getAllGalleryElements();
                if (elements.length > 0) {
                    currentIndex = (currentIndex - 1 + elements.length) % elements.length;
                    updateLightboxContent();
                }
            }

            // Event delegation for gallery items
            grid.addEventListener('click', function(e) {
                // Prüfe, ob das Gerät ein mobiles Gerät ist
                const isMobile = window.innerWidth <= MOBILE_BREAKPOINT;
                
                // Nur auf Desktop-Geräten die Lightbox öffnen
                if (!isMobile && (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO')) {
                    const element = e.target;
                    const galleryItems = getAllGalleryElements();
                    const index = galleryItems.indexOf(element);
                    if (index !== -1) {
                        // Add a new state to history for back button support
                        history.pushState({lightboxOpen: true}, null, window.location.href);
                        openLightbox(index);
                    }
                }
            });

            // Lightbox controls
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox || e.target.classList.contains('lightbox-wrapper')) {
                    closeLightbox();
                } else if (e.target.id === 'prev-btn') {
                    e.stopPropagation();
                    prevElement();
                } else if (e.target.id === 'next-btn') {
                    e.stopPropagation();
                    nextElement();
                } else if (e.target.classList.contains('close-lightbox')) {
                    closeLightbox();
                }
            });

            // Keyboard navigation
            window.addEventListener('keydown', function(e) {
                // Prüfe, ob das Gerät ein mobiles Gerät ist
                const isMobile = window.innerWidth <= MOBILE_BREAKPOINT;
                
                // Deaktiviere die Tastaturnavigation auf mobilen Geräten
                if (!isMobile && lightbox.style.display === 'flex') {
                    switch(e.key) {
                        case 'ArrowRight':
                            nextElement();
                            break;
                        case 'ArrowLeft':
                            prevElement();
                            break;
                        case 'Escape':
                            closeLightbox();
                            break;
                    }
                }
            });
            
            // Browser back button support for mobile devices
            window.addEventListener('popstate', function(event) {
                if (lightbox.style.display === 'flex') {
                    closeLightbox();
                    // Prevent default browser back behavior
                    history.pushState(null, null, window.location.href);
                }
            });

        });
