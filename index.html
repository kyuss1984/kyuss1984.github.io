<!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" role="dialog" aria-hidden="true">
        <div class="lightbox-wrapper">
            <span class="close-lightbox" role="button" aria-label="Lightbox schließen">&times;</span>
            <span class="nav-btn prev" id="prev-btn" role="button" aria-label="Vorheriges Bild">&#10094;</span>
            <img class="lightbox-content" id="lightbox-img" alt="">
            <span class="nav-btn next" id="next-btn" role="button" aria-label="Nächstes Bild">&#10095;</span>
        </div>

        </div>

    <!-- Masonry.js einbinden -->
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script>
        // Masonry initialisieren
        document.addEventListener('DOMContentLoaded', function() {
            var grid = document.querySelector('#masonry-container');
            var msnry = new Masonry(grid, {
                itemSelector: '.gallery-item',
                columnWidth: '.gallery-item',
                percentPosition: true,
                gutter: 10
            });

            // ======================
            // Lazy Loading Module
            // ======================
            const lazyLoadingModule = (function() {
                // Use a queue to manage elements to be loaded for better performance
                const lazyElements = Array.from(document.querySelectorAll('img.lazy, video.lazy-video'));
                let loadingCount = 0;
                const maxConcurrentLoads = 6; // Reduced for better stability across devices
                
                // Helper function to check if an element is in the viewport or near the bottom
                // Adjusted preload distance for more balanced loading
                function isInViewport(element) {
                    const rect = element.getBoundingClientRect();
                    const isMobile = window.innerWidth <= 768;
                    // Reduced preload distance for more controlled loading
                    const preloadDistance = isMobile ? 1000 : 500; 
                    return (
                        rect.top >= 0 &&
                        rect.left >= 0 &&
                        rect.top <= (window.innerHeight || document.documentElement.clientHeight) + preloadDistance
                    );
                }
                
                // Function to load an element (image or video)
                function loadElement(element) {
                    if (loadingCount >= maxConcurrentLoads) return false;
                    
                    loadingCount++;
                    element.src = element.dataset.src; // Set the src from data-src
                    element.classList.remove('lazy', 'lazy-video');
                    
                    // For images
                    if (element.tagName === 'IMG') {
                        element.onload = () => {
                            loadingCount--;
                            element.classList.add('loaded');
                            msnry.layout();
                            loadNextElement();
                        };
                        
                        element.onerror = () => {
                            loadingCount--;
                            element.classList.add('error');
                            loadNextElement();
                        };
                    } 
                    // For videos
                    else if (element.tagName === 'VIDEO') {
                        element.onloadeddata = () => {
                            loadingCount--;
                            element.classList.add('loaded');
                            msnry.layout();
                            
                            // Try to play the video automatically
                            if (element.autoplay) {
                                element.muted = true; // Ensure muted for autoplay
                                element.play().catch(e => console.log("Autoplay failed:", e));
                            }
                            
                            loadNextElement();
                        };
                        
                        element.onerror = () => {
                            loadingCount--;
                            element.classList.add('error');
                            loadNextElement();
                        };
                        
                        // Start loading the video data
                        element.load();
                    }
                    
                    return true;
                }
                
                // Function to load the next available element from the list
                function loadNextElement() {
                    if (loadingCount >= maxConcurrentLoads) return;
                    
                    // Loop through all elements
                    for (let i = 0; i < lazyElements.length; i++) {
                        const element = lazyElements[i];
                        
                        if (element.classList.contains('lazy') || element.classList.contains('lazy-video')) {
                            if (isInViewport(element)) {
                                if (loadElement(element)) {
                                    break; // Only load one element at a time
                                }
                            }
                        }
                    }
                }
                
                // Initial load of visible elements
                function init() {
                    loadNextElement();
                    
                    // Also check when scrolling and resizing for responsiveness
                    let scrollTimer;
                    let resizeTimer;
                    const eventHandler = function() {
                        clearTimeout(scrollTimer);
                        clearTimeout(resizeTimer);
                        // Debounce with a slightly longer delay for stability
                        scrollTimer = setTimeout(loadNextElement, 100);
                        resizeTimer = setTimeout(loadNextElement, 100);
                    };
                    
                    window.addEventListener('scroll', eventHandler);
                    window.addEventListener('resize', eventHandler);
                }
                
                // Expose public methods
                return {
                    init: init
                };
            })();

            // ======================
            // Lightbox Module
            // ======================
            const lightboxModule = (function() {
                const lightbox = document.getElementById('lightbox');
                const lightboxImg = document.getElementById('lightbox-img');
                // Create a reusable video element for the lightbox
                const lightboxVideo = document.createElement('video');
                lightboxVideo.controls = true;
                lightboxVideo.autoplay = true;
                lightboxVideo.loop = true;
                lightboxVideo.muted = false;
                lightboxVideo.style.maxWidth = '90vw';
                lightboxVideo.style.maxHeight = '90vh';
                lightboxVideo.style.borderRadius = '4px';
                lightboxVideo.style.boxShadow = '0 0 20px rgba(0,0,0,0.5)';
                // Initially hide the video element
                lightboxVideo.style.display = 'none';
                // Append the video element to the lightbox wrapper
                document.querySelector('.lightbox-wrapper').insertBefore(lightboxVideo, lightboxImg);
                
                let currentIndex = 0;

                // Helper function to get all gallery elements (images and videos)
                function getAllGalleryElements() {
                    return Array.from(document.querySelectorAll('.gallery-item img, .gallery-item video'));
                }

                // Update lightbox content
                function updateLightboxContent() {
                    const elements = getAllGalleryElements();
                    if (elements.length > 0 && currentIndex >= 0 && currentIndex < elements.length) {
                        const element = elements[currentIndex];
                        
                        // Clear previous content
                        lightboxImg.style.display = 'none';
                        lightboxVideo.style.display = 'none';
                        lightboxVideo.pause();
                        lightboxVideo.removeAttribute('src');
                        
                        // If it's an image
                        if (element.tagName === 'IMG') {
                            // Load the image if it hasn't been loaded yet
                            if (!element.src && element.dataset.src) {
                                element.src = element.dataset.src;
                            }
                            lightboxImg.src = element.src || element.dataset.src;
                            lightboxImg.alt = element.alt;
                            lightboxImg.style.display = 'block';
                        } 
                        // If it's a video
                        else if (element.tagName === 'VIDEO') {
                            // Load the video if it hasn't been loaded yet
                            if (!element.src && element.dataset.src) {
                                element.src = element.dataset.src;
                                element.load();
                            }
                            // Reuse the existing video element
                            lightboxVideo.src = element.src || element.dataset.src;
                            lightboxVideo.load();
                            lightboxVideo.style.display = 'block';
                            
                            // Try to play the video automatically
                            lightboxVideo.play().catch(e => console.log("Autoplay failed:", e));
                        }
                    }
                }

                // Open lightbox
                function openLightbox(index) {
                    currentIndex = index;
                    updateLightboxContent();
                    lightbox.style.display = 'flex';
                    lightbox.setAttribute('aria-hidden', 'false');
                    // Prevent background scrolling
                    document.body.style.overflow = 'hidden';
                }

                // Close lightbox
                function closeLightbox() {
                    lightbox.style.display = 'none';
                    lightbox.setAttribute('aria-hidden', 'true');
                    // Re-enable background scrolling
                    document.body.style.overflow = '';
                    
                    // Pause any playing video in lightbox
                    lightboxVideo.pause();
                    lightboxVideo.removeAttribute('src');
                }

                // Navigate to next element
                function nextElement() {
                    const elements = getAllGalleryElements();
                    if (elements.length > 0) {
                        currentIndex = (currentIndex + 1) % elements.length;
                        updateLightboxContent();
                    }
                }

                // Navigate to previous element
                function prevElement() {
                    const elements = getAllGalleryElements();
                    if (elements.length > 0) {
                        currentIndex = (currentIndex - 1 + elements.length) % elements.length;
                        updateLightboxContent();
                    }
                }
                
                // Initialize lightbox event listeners
                function init() {
                    // Event delegation for gallery items
                    grid.addEventListener('click', function(e) {
                        if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
                            const element = e.target;
                            const galleryItems = getAllGalleryElements();
                            const index = galleryItems.indexOf(element);
                            if (index !== -1) {
                                // Add a new state to history for back button support
                                history.pushState({lightboxOpen: true}, null, window.location.href);
                                openLightbox(index);
                            }
                        }
                    });

                    // Lightbox controls
                    lightbox.addEventListener('click', function(e) {
                        if (e.target === lightbox || e.target.classList.contains('lightbox-wrapper')) {
                            closeLightbox();
                        } else if (e.target.id === 'prev-btn') {
                            e.stopPropagation();
                            prevElement();
                        } else if (e.target.id === 'next-btn') {
                            e.stopPropagation();
                            nextElement();
                        } else if (e.target.classList.contains('close-lightbox')) {
                            closeLightbox();
                        }
                    });

                    // Keyboard navigation
                    window.addEventListener('keydown', function(e) {
                        if (lightbox.style.display === 'flex') {
                            switch(e.key) {
                                case 'ArrowRight':
                                    nextElement();
                                    break;
                                case 'ArrowLeft':
                                    prevElement();
                                    break;
                                case 'Escape':
                                    closeLightbox();
                                    break;
                            }
                        }
                    });
                    
                    // Browser back button support for mobile devices
                    window.addEventListener('popstate', function(event) {
                        if (lightbox.style.display === 'flex') {
                            closeLightbox();
                            // Prevent default browser back behavior
                            history.pushState(null, null, window.location.href);
                        }
                    });
                }
                
                // Expose public methods
                return {
                    init: init
                };
            })();

            // ======================
            // Initialize Modules
            // ======================
            lazyLoadingModule.init();
            lightboxModule.init();
        });
    </script>
