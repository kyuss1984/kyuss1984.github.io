    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-wrapper">
            <span class="close-lightbox">&times;</span>
            <span class="nav-btn prev" id="prev-btn">&#10094;</span>
            <img class="lightbox-content" id="lightbox-img">
            <span class="nav-btn next" id="next-btn">&#10095;</span>
        </div>
    </div>
 
    <!-- Masonry.js einbinden -->
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script>
        // Masonry initialisieren
        document.addEventListener('DOMContentLoaded', function() {
            var grid = document.querySelector('#masonry-container');
            var msnry = new Masonry(grid, {
                itemSelector: '.gallery-item',
                columnWidth: '.gallery-item',
                percentPosition: true,
                gutter: 10
            });

            // Lazy Loading Implementation with load limit
            const lazyImages = Array.from(document.querySelectorAll('img.lazy'));
            let loadingCount = 0;
            const maxConcurrentLoads = 15; // Limit to 15 concurrent image loads
            
            // Function to load an image
            function loadImage(img) {
                if (loadingCount >= maxConcurrentLoads) return false;
                
                loadingCount++;
                img.src = img.dataset.src; // Set the src from data-src
                img.classList.remove('lazy');
                
                // Important: Tell Masonry to layout after the image loads
                img.onload = () => {
                    loadingCount--;
                    // Add loaded class to show the image
                    img.classList.add('loaded');
                    msnry.layout();
                    // Try to load more images
                    loadNextImage();
                };
                
                img.onerror = () => {
                    loadingCount--;
                    // Try to load more images
                    loadNextImage();
                };
                
                return true;
            }
            
            // Function to load the next available image
            function loadNextImage() {
                if (loadingCount >= maxConcurrentLoads) return;
                
                for (let i = 0; i < lazyImages.length; i++) {
                    const img = lazyImages[i];
                    if (img.classList.contains('lazy')) {
                        if (isInViewport(img)) {
                            if (loadImage(img)) {
                                break; // Only load one image at a time
                            }
                        }
                    }
                }
            }
            
            // Helper function to check if an element is in the viewport or near the bottom
            function isInViewport(element) {
                const rect = element.getBoundingClientRect();
                // Load images that are in viewport or up to 1000px below the viewport
                return (
                    rect.top >= 0 &&
                    rect.left >= 0 &&
                    rect.top <= (window.innerHeight || document.documentElement.clientHeight) + 1000
                );
            }
            
            // Initial load of visible images
            loadNextImage();
            
            // Also check when scrolling
            window.addEventListener('scroll', loadNextImage);
        });

        // Lightbox Logik
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-lightbox');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        // We need to update this list dynamically because images load lazily
        function getAllImages() {
            return Array.from(document.querySelectorAll('.gallery-item img'));
        }
        
        let currentIndex = 0;

        function updateLightboxImage() {
            const imgs = getAllImages();
            const img = imgs[currentIndex];
            lightboxImg.src = img.src || img.dataset.src;
        }

        // Instead of a fixed loop, we add click listeners to all gallery items
        document.querySelectorAll('.gallery-item img').forEach((img, index) => {
            img.onclick = function() {
                currentIndex = index;
                updateLightboxImage();
                lightbox.style.display = 'flex';
            };
        });

        closeBtn.onclick = function() {
            lightbox.style.display = 'none';
        };

        prevBtn.onclick = function(e) {
            e.stopPropagation();
            const imgs = getAllImages();
            currentIndex = (currentIndex - 1 + imgs.length) % imgs.length;
            updateLightboxImage();
        };

        nextBtn.onclick = function(e) {
            e.stopPropagation();
            const imgs = getAllImages();
            currentIndex = (currentIndex + 1) % imgs.length;
            updateLightboxImage();
        };

        lightbox.onclick = function(e) {
            if (e.target === lightbox || e.target.classList.contains('lightbox-wrapper')) {
                lightbox.style.display = 'none';
            }
        };

        // Pfeiltasten-Navigation hinzufügen
        window.addEventListener('keydown', function(e) {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowRight') {
                    nextBtn.click();
                } else if (e.key === 'ArrowLeft') {
                    prevBtn.click();
                } else if (e.key === 'Escape') {
                    closeBtn.click();
                }
            }
        });
    </script>
