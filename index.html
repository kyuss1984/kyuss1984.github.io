    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" role="dialog" aria-hidden="true">
        <div class="lightbox-wrapper">
            <span class="close-lightbox" role="button" aria-label="Lightbox schließen">&times;</span>
            <span class="nav-btn prev" id="prev-btn" role="button" aria-label="Vorheriges Bild">&#10094;</span>
            <img class="lightbox-content" id="lightbox-img" alt="">
            <span class="nav-btn next" id="next-btn" role="button" aria-label="Nächstes Bild">&#10095;</span>
        </div>
    </div>
 
    <!-- Masonry.js einbinden -->
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script>
        // Masonry initialisieren
        document.addEventListener('DOMContentLoaded', function() {
            var grid = document.querySelector('#masonry-container');
            var msnry = new Masonry(grid, {
                itemSelector: '.gallery-item',
                columnWidth: '.gallery-item',
                percentPosition: true,
                gutter: 10
            });

            // Lazy Loading Implementation with load limit
            const lazyElements = Array.from(document.querySelectorAll('img.lazy, video.lazy-video'));
            let loadingCount = 0;
            const maxConcurrentLoads = 15; // Limit to 15 concurrent loads
            
            // Function to load an element (image or video)
            function loadElement(element) {
                if (loadingCount >= maxConcurrentLoads) return false;
                
                loadingCount++;
                element.src = element.dataset.src; // Set the src from data-src
                element.classList.remove('lazy', 'lazy-video');
                
                // For images
                if (element.tagName === 'IMG') {
                    element.onload = () => {
                        loadingCount--;
                        element.classList.add('loaded');
                        msnry.layout();
                        loadNextElement();
                    };
                    
                    element.onerror = () => {
                        loadingCount--;
                        element.classList.add('error');
                        loadNextElement();
                    };
                } 
                // For videos
                else if (element.tagName === 'VIDEO') {
                    element.onloadeddata = () => {
                        loadingCount--;
                        element.classList.add('loaded');
                        msnry.layout();
                        
                        // Try to play the video automatically
                        if (element.autoplay) {
                            element.muted = true; // Ensure muted for autoplay
                            element.play().catch(e => console.log("Autoplay failed:", e));
                        }
                        
                        loadNextElement();
                    };
                    
                    element.onerror = () => {
                        loadingCount--;
                        element.classList.add('error');
                        loadNextElement();
                    };
                    
                    // Start loading the video data
                    element.load();
                }
                
                return true;
            }
            
            // Function to load the next available element
            function loadNextElement() {
                if (loadingCount >= maxConcurrentLoads) return;
                
                for (let i = 0; i < lazyElements.length; i++) {
                    const element = lazyElements[i];
                    if (element.classList.contains('lazy') || element.classList.contains('lazy-video')) {
                        if (isInViewport(element)) {
                            if (loadElement(element)) {
                                break; // Only load one element at a time
                            }
                        }
                    }
                }
            }
            
            // Helper function to check if an element is in the viewport or near the bottom
            function isInViewport(element) {
                const rect = element.getBoundingClientRect();
                // Load elements that are in viewport or up to 500px below the viewport
                return (
                    rect.top >= 0 &&
                    rect.left >= 0 &&
                    rect.top <= (window.innerHeight || document.documentElement.clientHeight) + 500
                );
            }
            
            // Initial load of visible elements
            loadNextElement();
            
            // Also check when scrolling
            let scrollTimer;
            window.addEventListener('scroll', function() {
                // Debounce scroll events
                clearTimeout(scrollTimer);
                scrollTimer = setTimeout(loadNextElement, 100);
            });

            // Lightbox Logik mit Event Delegation
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            let currentIndex = 0;

            // Helper function to get all loaded elements (images and videos)
            function getLoadedElements() {
                return Array.from(document.querySelectorAll('.gallery-item img.loaded, .gallery-item img.error, .gallery-item video.loaded, .gallery-item video.error'));
            }

            // Update lightbox content
            function updateLightboxContent() {
                const elements = getLoadedElements();
                if (elements.length > 0) {
                    const element = elements[currentIndex];
                    
                    // Clear previous content
                    lightboxImg.style.display = 'none';
                    const video = lightbox.querySelector('video');
                    if (video) video.remove();
                    
                    // If it's an image
                    if (element.tagName === 'IMG') {
                        lightboxImg.src = element.src || element.dataset.src;
                        lightboxImg.alt = element.alt;
                        lightboxImg.style.display = 'block';
                    } 
                    // If it's a video
                    else if (element.tagName === 'VIDEO') {
                        const videoElement = document.createElement('video');
                        videoElement.src = element.src || element.dataset.src;
                        videoElement.controls = true;
                        videoElement.autoplay = true;
                        videoElement.loop = true;
                        videoElement.muted = false;
                        videoElement.style.maxWidth = '90vw';
                        videoElement.style.maxHeight = '90vh';
                        videoElement.style.borderRadius = '4px';
                        videoElement.style.boxShadow = '0 0 20px rgba(0,0,0,0.5)';
                        lightbox.querySelector('.lightbox-wrapper').insertBefore(videoElement, lightboxImg);
                    }
                }
            }

            // Open lightbox
            function openLightbox(index) {
                currentIndex = index;
                updateLightboxContent();
                lightbox.style.display = 'flex';
                lightbox.setAttribute('aria-hidden', 'false');
                // Prevent background scrolling
                document.body.style.overflow = 'hidden';
            }

            // Close lightbox
            function closeLightbox() {
                lightbox.style.display = 'none';
                lightbox.setAttribute('aria-hidden', 'true');
                // Re-enable background scrolling
                document.body.style.overflow = '';
                
                // Pause any playing video in lightbox
                const video = lightbox.querySelector('video');
                if (video) {
                    video.pause();
                    video.remove();
                }
            }

            // Navigate to next element
            function nextElement() {
                const elements = getLoadedElements();
                if (elements.length > 0) {
                    currentIndex = (currentIndex + 1) % elements.length;
                    updateLightboxContent();
                }
            }

            // Navigate to previous element
            function prevElement() {
                const elements = getLoadedElements();
                if (elements.length > 0) {
                    currentIndex = (currentIndex - 1 + elements.length) % elements.length;
                    updateLightboxContent();
                }
            }

            // Event delegation for gallery items
            grid.addEventListener('click', function(e) {
                if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
                    const element = e.target;
                    const galleryItems = Array.from(document.querySelectorAll('.gallery-item img.loaded, .gallery-item img.error, .gallery-item video.loaded, .gallery-item video.error'));
                    const index = galleryItems.indexOf(element);
                    if (index !== -1) {
                        openLightbox(index);
                    }
                }
            });

            // Lightbox controls
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox || e.target.classList.contains('lightbox-wrapper')) {
                    closeLightbox();
                } else if (e.target.id === 'prev-btn') {
                    e.stopPropagation();
                    prevElement();
                } else if (e.target.id === 'next-btn') {
                    e.stopPropagation();
                    nextElement();
                } else if (e.target.classList.contains('close-lightbox')) {
                    closeLightbox();
                }
            });

            // Keyboard navigation
            window.addEventListener('keydown', function(e) {
                if (lightbox.style.display === 'flex') {
                    switch(e.key) {
                        case 'ArrowRight':
                            nextElement();
                            break;
                        case 'ArrowLeft':
                            prevElement();
                            break;
                        case 'Escape':
                            closeLightbox();
                            break;
                    }
                }
            });
        });
